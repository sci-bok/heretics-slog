---
layout: default
---

<section class="slog-hero">
  <h1>Notes from inside the machine.</h1>
  <p class="slog-subtitle">A log from inside the machine.</p>
</section>

<section class="slog-posts">
  <div class="post-grid">
    {% for post in site.posts %}
      <article class="post-card">
        <h3>
          <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
          <span class="post-date-inline">— {{ post.date | date: "%B %-d, %Y" }}</span>
        </h3>
        <p>{{ post.excerpt | strip_html | normalize_whitespace | truncate: 220 }}</p>
        <p><a class="read-more" href="{{ post.url | relative_url }}">Read log →</a></p>
      </article>
    {% endfor %}
  </div>
</section>
